name: Rust

on:
  push:
    branches: [ "main" ]
    paths:
      - "pdf-utils/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - "pdf-utils/**"

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: pdf-utils

    steps:
    - uses: actions/checkout@v4
    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
    - name: Build
      run: cargo build --workspace --verbose
    - name: Run tests
      run: cargo test --workspace --verbose
